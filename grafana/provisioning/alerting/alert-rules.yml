apiVersion: 1

groups:
  - orgId: 1
    name: claude-code-cost
    folder: Claude Code
    interval: 1m
    rules:
      - uid: cc-hourly-cost
        title: Claude Code hourly cost > $5
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 3600, to: 0}
            datasourceUid: prometheus
            model:
              expr: sum(increase(claude_code_cost_usage_USD_total[1h]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [5]}
              refId: C
        for: 5m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Claude Code spent over $5 in the last hour
          description: "Total Claude Code cost in the last 1h: {{ humanize $values.A.Value }} USD"
        labels:
          severity: warning

      - uid: cc-daily-cost
        title: Claude Code daily cost > $50
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 86400, to: 0}
            datasourceUid: prometheus
            model:
              expr: sum(increase(claude_code_cost_usage_USD_total[24h]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [50]}
              refId: C
        for: 10m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Claude Code spent over $50 in the last 24h
          description: "Total Claude Code cost in the last 24h: {{ humanize $values.A.Value }} USD"
        labels:
          severity: critical

      - uid: cc-token-burn
        title: Claude Code token burn > 1M tokens / 5min
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: sum(increase(claude_code_token_usage_tokens_total[5m]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [1000000]}
              refId: C
        for: 5m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Unusual Claude Code token burn rate
          description: "{{ humanize $values.A.Value }} tokens consumed in the last 5 minutes"
        labels:
          severity: warning

  - orgId: 1
    name: copilot-usage
    folder: Copilot
    interval: 1m
    rules:
      - uid: cp-token-burn
        title: Copilot token burn > 500K tokens / 5min
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: sum(increase(gen_ai_client_token_usage_sum[5m]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [500000]}
              refId: C
        for: 5m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Unusual Copilot token burn rate
          description: "{{ humanize $values.A.Value }} tokens consumed via Copilot in the last 5 minutes"
        labels:
          severity: warning

      - uid: cp-llm-latency
        title: Copilot LLM p95 duration > 30s
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum by (le) (rate(gen_ai_client_operation_duration_bucket[5m]))) / 1000
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [30]}
              refId: C
        for: 10m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Copilot LLM calls are slow
          description: "p95 LLM operation duration over the last 5m: {{ humanize $values.A.Value }}s"
        labels:
          severity: warning
