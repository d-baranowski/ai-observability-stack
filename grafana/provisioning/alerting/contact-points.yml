apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack
    receivers:
      - uid: slack-default
        type: slack
        settings:
          url: $SLACK_WEBHOOK_URL
          title: |
            {{ template "default.title" . }}
          text: |
            {{ range .Alerts }}
            *{{ .Labels.alertname }}* — {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}

policies:
  - orgId: 1
    receiver: slack
    group_by: [alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
